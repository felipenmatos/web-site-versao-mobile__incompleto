<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#">
        <div>
            <label for="primeironome">Primeiro Nome</label><br>
            <input id="primeironome" type="text" nome="primeironome"><br>            
        </div>
        <div>
            <label for="receberemails">Deseja receber e-mails de promoções?</label>
            <input id="receberemails" type="checkbox" nome="receberemails"><br>
        </div>
        <div>
            <label for="">Sexo:</label><br>

            <input id="sexomasculino" type="radio" name="sexo" value="masculino">
            <label for="sexomasculino">Masculino</label><br>

            <input id="sexofeminino" type="radio" nome="sexo" value="feminino">
            <label for="sexofeminino">Feminino</label><br>

            <input id="sexooutros" type="radio" nome="sexo" value="outros">
            <label for="sexooutros">Outros</label><br>

            <label for="estados">Estados</label>
            <select name="estados" id="estados">
                <option value="saopaulo">São Paulo</option>
                <option value="rio">Rio de Janeiro</option>
                <option value="bahia">Bahia</option>
                <option value="minas">Minas Gerais</option>
                <option value="riogrande">Rio Grande do Sul</option>
                <option value="goias">Goias</option>
                <option value="paraná">Paraná</option>
                <option value="pará">Pará</option>
                <option value="santacatarina">Santa Catarina</option>
                <option value="pernambuco">Pernambuco</option>
                <option value="amazonas">Amazonas</option>
                <option value="ceara">Ceará</option>
                <option value="sergipe">Sergipe</option>
                <option value="espiritosanto">Espirito Santo</option>
                <option value="maranhao">Maranhao</option>
                <option value="matogrosso">Mato Grosso</option>
                <option value="matogrossodosul">Mato Grosso do Sul</option>
                <option value="piaui">Piauí</option>
                <option value="paraiba">Paraíba</option>
                <option value="matogrossodosul">Mato Grosso do Sul</option>
                <option value="riograndedonorte">Rio Grande do Norte</option>
                <option value="tocatins">Tocatins</option>
                <option value="alagoas">Alagoas</option>
                <option value="amapa">Amapá</option>
                <option value="acre">Acre</option>
                <option value="rondonia">Rondônia</option>
                <option value="roraima">Roraima</option>
            </select><br>

            <label for="observacoes">Observações:</label><br>
            <textarea name="observacoes" id="observacoes" cols="20" rows="5"></textarea>
        </div>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
